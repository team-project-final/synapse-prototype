<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synapse — 통합 학습-지식 그래프 SaaS</title>
    <meta name="description" content="노트를 쓰면 AI가 카드를 만들어주고, 복습하면 노트가 다시 살아난다." />
    <script type="text/javascript">
      // SPA GitHub Pages redirect (https://github.com/rafgraph/spa-github-pages)
      // Restore deep-link URL after 404.html bounced us to /?/foo/bar
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body class="bg-stone-50 text-stone-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
